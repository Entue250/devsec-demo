<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}UAS{% endblock %}</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: system-ui, sans-serif;
        background: #f5f5f5;
        color: #333;
      }
      nav {
        background: #1a1a2e;
        color: white;
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      nav a {
        color: #ccc;
        text-decoration: none;
        margin-left: 1rem;
      }
      nav a:hover {
        color: white;
      }
      .container {
        max-width: 600px;
        margin: 2rem auto;
        background: white;
        padding: 2rem;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      .messages {
        margin-bottom: 1rem;
      }
      .messages li {
        list-style: none;
        padding: 0.75rem;
        border-radius: 4px;
        margin-bottom: 0.5rem;
      }
      .messages .success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }
      .messages .error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }
      .messages .info {
        background: #d1ecf1;
        color: #0c5460;
        border: 1px solid #bee5eb;
      }
      .messages .warning {
        background: #fff3cd;
        color: #856404;
        border: 1px solid #ffc107;
      }
      label {
        display: block;
        margin-top: 1rem;
        font-weight: 600;
        font-size: 0.9rem;
      }
      input[type='text'],
      input[type='password'],
      input[type='email'] {
        width: 100%;
        padding: 0.5rem;
        margin-top: 0.25rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 1rem;
      }
      .helptext {
        font-size: 0.8rem;
        color: #666;
        margin-top: 0.2rem;
      }
      .errorlist {
        color: #721c24;
        font-size: 0.85rem;
        margin-top: 0.25rem;
        padding-left: 1rem;
      }
      button[type='submit'] {
        margin-top: 1.5rem;
        width: 100%;
        padding: 0.75rem;
        background: #1a1a2e;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        cursor: pointer;
      }
      button[type='submit']:hover {
        background: #16213e;
      }
      .link-row {
        margin-top: 1rem;
        text-align: center;
        font-size: 0.9rem;
      }
      .link-row a {
        color: #1a1a2e;
      }
      h1 {
        margin-bottom: 1rem;
      }
    </style>
  </head>
  <body>
    <nav>
      <span><strong>UAS</strong> — User Auth Service</span>
      <span>
        {% if user.is_authenticated %}
        <a href="{% url 'eduard:dashboard' %}">Dashboard</a>
        <a href="{% url 'eduard:profile' %}">Profile</a>
        <form method="post" action="{% url 'eduard:logout' %}" style="display: inline">
          {% csrf_token %}
          <button
            type="submit"
            style="
              background: none;
              border: none;
              color: #ccc;
              cursor: pointer;
              font-size: 1rem;
              padding: 0;
              margin-left: 1rem;
            "
          >
            Logout
          </button>
        </form>
        {% else %}
        <a href="{% url 'eduard:login' %}">Login</a>
        <a href="{% url 'eduard:register' %}">Register</a>
        {% endif %}
      </span>
    </nav>
    <div class="container">
      {% if messages %}
      <ul class="messages">
        {% for message in messages %}
        <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
      </ul>
      {% endif %} {% block content %}{% endblock %}
    </div>
  </body>
</html>
