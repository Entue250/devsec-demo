{% extends "eduard/base.html" %} {% block title %}Profile{% endblock %} {% block content %}
<h1>Your profile</h1>
<table style="width: 100%; margin-top: 1rem; border-collapse: collapse">
  <tr style="border-bottom: 1px solid #eee">
    <td style="padding: 0.5rem; color: #555">Username</td>
    <td style="padding: 0.5rem"><strong>{{ user.username }}</strong></td>
  </tr>
  <tr style="border-bottom: 1px solid #eee">
    <td style="padding: 0.5rem; color: #555">Email</td>
    <td style="padding: 0.5rem">{{ user.email }}</td>
  </tr>
  <tr style="border-bottom: 1px solid #eee">
    <td style="padding: 0.5rem; color: #555">Member since</td>
    <td style="padding: 0.5rem">{{ user.date_joined|date:"N j, Y" }}</td>
  </tr>
  <tr>
    <td style="padding: 0.5rem; color: #555">Last login</td>
    <td style="padding: 0.5rem">{{ user.last_login|date:"N j, Y, P" }}</td>
  </tr>
</table>
<p style="margin-top: 1.5rem"><a href="{% url 'eduard:change_password' %}">Change password</a></p>
{% endblock %}
